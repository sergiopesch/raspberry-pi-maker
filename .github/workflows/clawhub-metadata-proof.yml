name: ClawHub catalog metadata proof

on:
  pull_request:
    paths:
      - .github/workflows/clawhub-metadata-proof.yml

permissions: {}

jobs:
  validate-clawhub:
    name: Validate ClawHub PR
    runs-on: ubuntu-latest
    timeout-minutes: 45
    permissions:
      contents: read
    steps:
      - name: Check out the exact ClawHub PR revision
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          repository: sergiopesch/clawhub
          ref: 6f34a65f328f938326c7826463a2311edc325d72
          fetch-depth: 0
          persist-credentials: false

      - name: Set up Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6
        with:
          bun-version: 1.3.10

      - name: Install exact dependencies
        run: bun install --frozen-lockfile

      - name: List documentation surface
        run: bun run docs:list

      - name: Run focused workflow contract test
        run: bunx vitest run src/__tests__/package-publish-workflow.test.ts

      - name: Run deterministic static gates
        run: |
          bun run check:peers
          bun run llms:check
          bun run format:check
          bun run lint
          bun run deadcode:ci
          bun run check:release-workflow-action-pins

      - name: Record dependency audit baseline
        continue-on-error: true
        run: |
          bun audit \
            --ignore GHSA-rmmr-r34h-pfm5 \
            --ignore GHSA-gv7w-rqvm-qjhr \
            --ignore GHSA-g7r4-m6w7-qqqr \
            --ignore GHSA-x4vx-rjvf-j5p4 \
            --ignore GHSA-76mc-f452-cxcm \
            --ignore GHSA-hpcv-96wg-7vj8 \
            --ignore GHSA-r47g-fvhr-h676 \
            --ignore GHSA-vxr8-fq34-vvx9 \
            --ignore GHSA-gvmj-g25r-r7wr \
            --ignore GHSA-rp9w-3fw7-7cwq \
            --ignore GHSA-cmwh-pvxp-8882 \
            --ignore GHSA-vmh5-mc38-953g \
            --ignore GHSA-pr7r-676h-xcf6

      - name: Run unit coverage gate
        run: bun run ci:unit

      - name: Run package gate
        if: always()
        run: bun run ci:packages

  metadata-present:
    name: Dry run with catalog metadata
    permissions:
      actions: read
      contents: read
      id-token: write
    uses: sergiopesch/clawhub/.github/workflows/package-publish.yml@6f34a65f328f938326c7826463a2311edc325d72
    with:
      source: sergiopesch/raspberry-pi-maker@25183c95ba7ad5de48c5939dda1aab1e10e8d3b0
      dry_run: true
      changelog: "Proof: forward release metadata through the reusable workflow."
      categories: "tools"
      topics: "raspberry-pi,gpio,sensors,python,maker"
      inspector_artifact_name: metadata-present-inspector
      publish_json_artifact_name: metadata-present-publish-json

  metadata-omitted:
    name: Dry run with catalog metadata omitted
    permissions:
      actions: read
      contents: read
      id-token: write
    uses: sergiopesch/clawhub/.github/workflows/package-publish.yml@6f34a65f328f938326c7826463a2311edc325d72
    with:
      source: sergiopesch/raspberry-pi-maker@25183c95ba7ad5de48c5939dda1aab1e10e8d3b0
      dry_run: true
      inspector_artifact_name: metadata-omitted-inspector
      publish_json_artifact_name: metadata-omitted-publish-json
