name: Publish to ClawHub

on:
  workflow_dispatch:
    inputs:
      changelog:
        description: Short release note shown on ClawHub
        required: true
        type: string

permissions:
  actions: read
  contents: read
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Check out Raspberry Pi Maker
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0

      - name: Set up Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6
        with:
          bun-version: 1.3.10

      - name: Check out the pinned ClawHub publisher
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          repository: openclaw/clawhub
          ref: a230d962db64019462c2c8ee400755eb92169908
          path: .clawhub-source

      - name: Install ClawHub CLI dependencies
        working-directory: .clawhub-source
        run: bun install --frozen-lockfile

      - name: Publish trusted release with catalog metadata
        env:
          RELEASE_CHANGELOG: ${{ inputs.changelog }}
        run: >-
          bun .clawhub-source/packages/clawhub/src/cli.ts
          package publish .
          --categories tools
          --topics "Raspberry Pi,GPIO,electronics,maker,hardware"
          --changelog "$RELEASE_CHANGELOG"
          --json
